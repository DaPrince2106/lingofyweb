<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingofy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 0;
            margin-bottom: 30px;
            box-shadow: none;
            background: transparent;
            margin-left: auto;
            margin-right: auto;
            background-image: url('newappicon.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        .app-title {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 32px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        /* App Store Button Styling */
        .app-store-button {
            display: inline-block;
            margin-top: 30px;
            transition: transform 0.2s ease;
        }

        .app-store-button:hover {
            transform: scale(1.05);
        }

        .app-store-button img {
            height: 60px;
            width: auto;
            border-radius: 8px;
        }

        /* Footer Links */
        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .footer a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #007AFF;
            text-decoration: underline;
        }

    </style>
</head>
<body>
    
    <div class="container">
        <div class="app-icon"></div>
        <div class="app-title">Lingofy</div>
        <div class="app-description">Lingofy is an AI-powered language translation mobile application that provides translation services for multimedia content including videos, audio files, images, documents, and text.</div>
        
        <!-- App Store Button -->
        <a href="https://apps.apple.com/us/app/floor-plan-ai-home-camplan/id6444421373" class="app-store-button">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
        </a>
    </div>

    <!-- Footer Links -->
    <div class="footer">
        <a href="terms.html">Terms of Service</a>
        <a href="privacy.html">Privacy Policy</a>
    </div>

</body>
</html>
